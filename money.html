    <h1>عد تنازلي للمكافأة - جامعة الملك خالد</h1>
    <h2>إيداع المكافأة يتم في يوم 23 من كل شهر ميلادي</h2>

    <table>
        <thead>
            <tr>
                <th>التاريخ</th>
                <th>اليوم</th>
                <th>الأيام المتبقية</th>
                <th>العد التنازلي</th>
            </tr>
        </thead>
        <tbody id="countdownTable">
            <!-- سيتم تعبئة البيانات هنا عبر JavaScript -->
        </tbody>
    </table>

    <div class="warning">
        <i class="fas fa-exclamation-circle"></i> المكافأة لا تُصرف خلال عطلة نهاية الأسبوع.
    </div>

<script>
// عدد الزوار 
fetch('visitors.php')
    .then(response => {
        if (!response.ok) {
            throw new Error('خطأ في الاتصال بالخادم');
        }
        return response.json();
    })
    .then(data => {
        if (data.error) {
            document.getElementById('visitor-count').innerText = 'خطأ: ' + data.error;
        } else {
            document.getElementById('visitor-count').innerText = `عدد الزائرين: ${data.visitors} زائر`;
        }
    })
    .catch(error => {
        document.getElementById('visitor-count').innerText = 'خطأ: ' + error.message;
    });

        function generateCountdownTable() {
            const tableBody = document.getElementById("countdownTable");
            const today = new Date();
            const targetDay = 23; // تحديد اليوم المستهدف
            const daysOfWeek = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];

            // تحديد التاريخ المستهدف
            let targetDate = new Date(today.getFullYear(), today.getMonth(), targetDay);

            // إذا كان اليوم الحالي تجاوز التاريخ المستهدف، انتقل إلى الشهر التالي
            if (today >= targetDate) {
                targetDate = new Date(today.getFullYear(), today.getMonth() + 1, targetDay);
            }

            // حساب الفرق الزمني بين اليوم والتاريخ المستهدف
            const timeDifference = targetDate - today;
            const totalSeconds = Math.floor(timeDifference / 1000);
            const days = Math.floor(totalSeconds / (60 * 60 * 24));
            const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
            const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
            const seconds = totalSeconds % 60;

            // إنشاء صف الجدول
            const row = document.createElement("tr");

            const dateCell = document.createElement("td");
            dateCell.textContent = `${targetDate.getDate()}-${targetDate.getMonth() + 1}-${targetDate.getFullYear()}`;
            row.appendChild(dateCell);

            const dayCell = document.createElement("td");
            dayCell.textContent = daysOfWeek[targetDate.getDay()];
            row.appendChild(dayCell);

            const daysRemainingCell = document.createElement("td");
            daysRemainingCell.textContent = days >= 0 ? days + " يوم" : "تم";
            row.appendChild(daysRemainingCell);

            const countdownCell = document.createElement("td");
            countdownCell.textContent = days >= 0
                ? `${days}ي، ${hours}س، ${minutes}د، ${seconds}ث.`
                : "تم";
            row.appendChild(countdownCell);

            tableBody.appendChild(row);

            // تحديث العد التنازلي كل ثانية
            if (days >= 0) {
                setInterval(() => updateCountdown(row, targetDate), 1000);
            }
        }

        // تحديث العد التنازلي كل ثانية
        function updateCountdown(row, targetDate) {
            const now = new Date();
            const timeDifference = targetDate - now;

            const totalSeconds = Math.floor(timeDifference / 1000);
            const days = Math.floor(totalSeconds / (60 * 60 * 24));
            const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
            const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
            const seconds = totalSeconds % 60;

            const daysRemainingCell = row.children[2];
            const countdownCell = row.children[3];

            if (days >= 0) {
                daysRemainingCell.textContent = days + " يوم";
                countdownCell.textContent = `${days}ي، ${hours}س، ${minutes}د، ${seconds}ث.`;
            } else {
                // إذا انتهى العد التنازلي، انتقل إلى الشهر التالي
                targetDate.setMonth(targetDate.getMonth() + 1); // الانتقال إلى الشهر التالي
                targetDate.setDate(targetDay); // الحفاظ على نفس اليوم في الشهر التالي

                const newTimeDifference = targetDate - now;
                const newTotalSeconds = Math.floor(newTimeDifference / 1000);
                const newDays = Math.floor(newTotalSeconds / (60 * 60 * 24));
                const newHours = Math.floor((newTotalSeconds % (60 * 60 * 24)) / (60 * 60));
                const newMinutes = Math.floor((newTotalSeconds % (60 * 60)) / 60);
                const newSeconds = newTotalSeconds % 60;

                daysRemainingCell.textContent = newDays + " يوم";
                countdownCell.textContent = `${newDays}ي، ${newHours}س، ${newMinutes}د، ${newSeconds}ث.`;
            }
        }

        // استدعاء الدالة لإنشاء الجدول
        generateCountdownTable();
    </script>
