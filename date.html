#visitor-count {

      align-items: center; /* توسيط المحتوى عمودياً */
      text-align: center; /* توسيط النص داخل الرابط (إذا كان موجوداً) */
      margin: 20px; /* إضافة مسافة خارجية */
    }

      max-width: 150px; /* تحديد الحد الأقصى لعرض الصورة */

<body>
<a href="https://t.me/kku_4" target="_blank" class="LogoKKU">
        <img src="https://upload.wikimedia.org/wikipedia/ar/7/75/%D8%B4%D8%B9%D8%A7%D8%B1_%D8%AC%D8%A7%D9%85%D8%B9%D8%A9_%D8%A7%D9%84%D9%85%D9%84%D9%83_%D8%AE%D8%A7%D9%84%D8%AF.png" alt="شعار جامعة الملك خالد">
    </a>
  <div class="container">
    <h2>التاريخ</h2>
    <div class="date-box">
      <p>📅 <strong>اليــوم:</strong> <span id="current-day"></span></p>
      <p>📝 <strong>التاريــخ الهجري:</strong> <span id="current-date"></span></p>
      <p>🗓 <strong>التاريخ الميلادي:</strong> <span id="gregorian-date"></span></p>
      <p>⏰ <strong>الوقت الحالي:</strong> <span id="current-time"></span></p>
    </div>

    <div id="visitor-count">جاري التحميل...</div>
    <div class="noteText">
      <i class="fa fa-code"></i> الموقع تطوعي لخدمة الطلاب ولا يمثل جهة رسمية.
    </div>
  </div>

  <!-- تضمين JavaScript الخاص بالتاريخ -->
<script>
// عدد الزوار 
fetch('visitors.php')
    .then(response => {
        if (!response.ok) {
            throw new Error('خطأ في الاتصال بالخادم');
        }
        return response.json();
    })
    .then(data => {
        if (data.error) {
            document.getElementById('visitor-count').innerText = 'خطأ: ' + data.error;
        } else {
            document.getElementById('visitor-count').innerText = `عدد الزائرين: ${data.visitors} زائر`;
        }
    })
    .catch(error => {
        document.getElementById('visitor-count').innerText = 'خطأ: ' + error.message;
    });

    // تحديد عناصر DOM
    const currentDateElement = document.getElementById("current-date");
    const currentDayElement = document.getElementById("current-day");
    const gregorianDateElement = document.getElementById("gregorian-date");
    const currentTimeElement = document.getElementById("current-time");

    // تحديث التاريخ والوقت
    function updateDateTime() {
      const now = new Date();

      // تنسيق اليوم والتاريخ الهجري
      const currentDay = now.toLocaleDateString("ar-SA", { weekday: "long" });
      const hijriDate = now.toLocaleDateString("ar-SA", { day: "numeric", month: "numeric", year: "numeric" });

      // تنسيق التاريخ الميلادي بالشكل "العام/الشهر/اليوم"
      const year = now.getFullYear();
      const month = (now.getMonth() + 1).toString().padStart(2, '0');
      const day = now.getDate().toString().padStart(2, '0');
      const gregorianDate = `${year}/${month}/${day}`;

      // تنسيق الوقت الحالي
      const hours = now.getHours() % 12 || 12;
      const minutes = now.getMinutes().toString().padStart(2, '0');
      const ampm = now.getHours() >= 12 ? "م" : "ص";
      const currentTime = `${hours}:${minutes} ${ampm}`;

      // تحديث عناصر HTML
      currentDayElement.innerText = currentDay;
      currentDateElement.innerText = hijriDate;
      gregorianDateElement.innerText = gregorianDate;
      currentTimeElement.innerText = currentTime;
    }

    // التحديث الفوري ثم التحديث كل دقيقة
    updateDateTime();
    setInterval(updateDateTime, 60000);
  </script>
