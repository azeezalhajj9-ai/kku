    <style>
        body {
            font-family: 'Arial', sans-serif;
            direction: rtl;
            background-color: #2c3e50; /* خلفية داكنة */
            color: #ecf0f1; /* نص فاتح */
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #34495e; /* خلفية المربعات */
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        h1, h2 {
            color: #66cc66; /* اللون الرئيسي */
            text-align: center;
        }
        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
        }
        select, input[type="number"], button {
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #bdc3c7; /* لون رمادي فاتح */
            border-radius: 5px;
            background-color: #ecf0f1; /* لون خلفية عناصر الإدخال */
            color: #34495e; /* لون نص داكن */
            font-size: 16px;
        }
        select, button {
            width: calc(100% - 20px);
        }
        input[type="number"] {
            width: calc(50% - 10px);
            display: inline-block;
        }
        button {
            width: calc(50% - 10px);
            background-color: #66cc66; /* اللون الرئيسي */
            color: #ffffff; /* نص أبيض */
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }
        button:hover {
            background-color: #5cbf5b; /* تدرج أغمق عند التمرير */
            transform: scale(1.05);
        }
        .subject {
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(236, 240, 241, 0.1); /* خلفية خفيفة */
            border-radius: 5px;
        }
        .remove-subject-btn {
            background-color: #e74c3c; /* لون أحمر */
        }
        .remove-subject-btn:hover {
            background-color: #c0392b; /* لون أحمر أغمق */
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #bdc3c7; /* لون رمادي فاتح */
            border-radius: 5px;
            background: rgba(236, 240, 241, 0.1); /* خلفية خفيفة */
            text-align: center;
            font-size: 18px; /* حجم نص أكبر */
        }
        .summary {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #bdc3c7; /* لون رمادي فاتح */
            border-radius: 5px;
            background: rgba(236, 240, 241, 0.1); /* خلفية خفيفة */
        }
        .alert {
            color: #ecf0f1; /* لون نص فاتح */
            padding: 10px;
            margin-top: 20px;
            text-align: center;
        }
        .LogoKKU {
      display: flex; /* يجعل الرابط عنصر مرن */
      justify-content: center; /* توسيط المحتوى أفقياً */
      align-items: center; /* توسيط المحتوى عمودياً */
      text-align: center; /* توسيط النص داخل الرابط (إذا كان موجوداً) */
      margin: 20px; /* إضافة مسافة خارجية */
    }

    .LogoKKU img {
      max-width: 150px; /* تحديد الحد الأقصى لعرض الصورة */
      height: auto; /* الحفاظ على نسبة العرض إلى الارتفاع */
    }


#visitor-count {
  text-align: center; /* توسيط النص أفقيًا */
  margin: 0 auto; /* إزالة أي هوامش إضافية */

  text-align: center; /* توسيط النص */

<body>
  <a href="https://t.me/kku_4" target="_blank" class="LogoKKU">
    <img src="https://upload.wikimedia.org/wikipedia/ar/7/75/%D8%B4%D8%B9%D8%A7%D8%B1_%D8%AC%D8%A7%D9%85%D8%B9%D8%A9_%D8%A7%D9%84%D9%85%D9%84%D9%83_%D8%AE%D8%A7%D9%84%D8%AF.png" alt="شعار جامعة الملك خالد">

    <div class="container">
        <h1><i class="fas fa-graduation-cap"></i> حساب المعدل الفصلي من 5</h1>
        
        <div id="gradesInput">
            <h2><i class="fas fa-book"></i> أدخل درجات المواد</h2>
            <div class="subject">
                <label> معلومات المادة رقم: 1</label>
                <select class="grade" onchange="calculateGPA()">
                    <option value="">أختار تقدير المادة</option>
                    <option value="5">A+ (100-95)</option>
<option value="4.75">A (90-94)</option>
<option value="4.5">B+ (85-89)</option>
<option value="4">B (80-84)</option>
<option value="3.5">C+ (75-79)</option>
<option value="3">C (70-74)</option>
<option value="2.5">D+ (65-69)</option>
<option value="2">D (60-64)</option>
<option value="1">F (0-59)</option>
                </select>
                <input type="number" class="credits" placeholder="عدد الساعات" min="1" oninput="calculateGPA()">
                <button class="remove-subject-btn" onclick="removeSubject(this)"><i class="fas fa-trash-alt"></i> حذف المادة</button>
            </div>
        </div>

        <button class="add-subject-btn" onclick="addSubject()"><i class="fas fa-plus"></i> أضف مادة</button>

        <div class="result" id="result"><i class="fas fa-calculator"></i> المعدل الفصلي: 0.000</div>
        
        <div class="summary" id="summary">
            <h2><i class="fas fa-chart-line"></i> النتائج التقريبية:</h2>
            <p><i class="fas fa-hourglass-half"></i> عدد الساعات: <span id="totalCredits">0</span></p>
            <p><i class="fas fa-star"></i> مجموع النقاط: <span id="totalPoints">0</span></p>
            <p><i class="fas fa-star"></i> المعدل: <span id="averageGPA">0.000</span></p>
            <p><i class="fas fa-graduation-cap"></i> التقدير: <span id="gradeEstimate">-</span></p>
        </div>
    </div>
    <div id="visitor-count">جاري التحميل...</div>
        <div class="alert">
            <label><i class="fas fa-exclamation-triangle"></i> هذا الموقع تطوعي لخدمة الطلاب ولا يمثل جهة رسمية</label>
        </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
// عدد الزوار 
fetch('visitors.php')
    .then(response => {
        if (!response.ok) {
            throw new Error('خطأ في الاتصال بالخادم');
        }
        return response.json();
    })
    .then(data => {
        if (data.error) {
            document.getElementById('visitor-count').innerText = 'خطأ: ' + data.error;
        } else {
            document.getElementById('visitor-count').innerText = `عدد الزائرين: ${data.visitors} زائر`;
        }
    })
    .catch(error => {
        document.getElementById('visitor-count').innerText = 'خطأ: ' + error.message;
    });

        function addSubject() {
            const gradesInput = document.getElementById('gradesInput');
            const subjectCount = gradesInput.getElementsByClassName('subject').length + 1;
            const newSubject = document.createElement('div');
            newSubject.classList.add('subject');
            newSubject.innerHTML = `
                <label>معلومات المادة رقم: ${subjectCount}:</label>
                <select class="grade" onchange="calculateGPA()">
                    <option value="">أختار تقدير المادة</option>
                    <option value="5">A+ (100-95)</option>
                    <option value="4.75">A (90-94)</option>
                    <option value="4.5">B+ (85-89)</option>
                    <option value="4">B (80-84)</option>
                    <option value="3.5">C+ (75-79)</option>
                    <option value="3">C (70-74)</option>
                    <option value="2.5">D+ (65-69)</option>
                    <option value="2">D (60-64)</option>
                    <option value="1">F (0-59)</option>
                </select>
                <input type="number" class="credits" placeholder="عدد الساعات" min="1" oninput="calculateGPA()">
                <button class="remove-subject-btn" onclick="removeSubject(this)"><i class="fas fa-trash-alt"></i> حذف المادة</button>
            `;
            gradesInput.appendChild(newSubject);
        }
        function removeSubject(button) {
            const subject = button.parentElement;
            Swal.fire({
                title: 'تأكيد الحذف',
                text: "هل أنت متأكد أنك تريد حذف هذه المادة؟",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#66cc66', // اللون الرئيسي
                cancelButtonColor: '#d33',
                confirmButtonText: 'نعم',
                cancelButtonText: 'لا'
            }).then((result) => {
                if (result.isConfirmed) {
                    subject.remove();
                    calculateGPA();
                    Swal.fire('تم الحذف!', 'تم حذف المادة بنجاح.', 'success');
                }
            });
        }

        function calculateGPA() {
            const grades = document.querySelectorAll('.grade');
            const credits = document.querySelectorAll('.credits');
            let totalPoints = 0;
            let totalCredits = 0;

            grades.forEach((gradeSelect, index) => {
                const gradeValue = parseFloat(gradeSelect.value) || 0;
                const creditHours = parseFloat(credits[index].value) || 0;
                
                totalPoints += gradeValue * creditHours;
                totalCredits += creditHours;
            });

            const gpa = totalCredits > 0 ? (totalPoints / totalCredits).toFixed(3) : 0.000;
            document.getElementById('result').innerText = `المعدل الفصلي: ${gpa}`;
            document.getElementById('totalPoints').innerText = totalPoints.toFixed(2); 

            updateSummary(totalCredits, gpa);
        }

        function updateSummary(totalCredits, gpa) {
            document.getElementById('totalCredits').innerText = totalCredits;

            let gradeEstimate = '';
            if (gpa >= 4.50) gradeEstimate = 'ممتاز';
            else if (gpa >= 3.75) gradeEstimate = 'جيد جدًا';
            else if (gpa >= 2.75) gradeEstimate = 'جيد';
            else if (gpa >= 2.00) gradeEstimate = 'مقبول';
            else gradeEstimate = 'راسب';

            document.getElementById('averageGPA').innerText = gpa;
            document.getElementById('gradeEstimate').innerText = gradeEstimate;
        }
    </script>
